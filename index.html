<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Veg Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Manjari', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .dark-mode { background-color: #020617 !important; color: #f8fafc; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: #f8fafc !important; border-color: #334155; }
        .dark-mode .text-slate-800 { color: #f1f5f9 !important; }
        .dark-mode .bg-slate-50 { background-color: #0f172a !important; }
        .dark-mode #cartSidebar { background-color: #1e293b !important; color: white; }
        .dark-mode input { background-color: #334155 !important; color: white !important; border-color: #475569 !important; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        #cartSidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .show-cart { transform: translateY(0) !important; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24" id="mainBody">

    <header class="bg-green-800 text-white p-4 shadow-lg sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-2">
            <button onclick="openAdminLogin()" class="bg-green-700 h-10 w-10 rounded-lg flex items-center justify-center hover:bg-green-600 transition">
                <i class="fas fa-lock text-xs"></i>
            </button> 
            <div class="text-center">
                <h1 class="text-xl font-black tracking-tight leading-none uppercase">Vegetable Shop</h1>
                <div id="liveTime" class="text-[10px] font-bold opacity-90 mt-1 uppercase"></div>
            </div>
            <button onclick="toggleDarkMode()" class="bg-green-700 h-10 w-10 rounded-lg flex items-center justify-center hover:bg-green-600 transition">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="bg-yellow-400 overflow-hidden py-1 border-b border-yellow-500 shadow-inner no-print">
        <div class="animate-marquee">
            <span class="text-green-900 font-black text-sm uppercase">
                🌼 Happy Vishu 🌼 | ഏവർക്കും ഐശ്വര്യപൂർണ്ണമായ വിഷു ആശംസകൾ! 🥬🍅🥕🧅🥔
            </span>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4">
        <div class="mb-4 no-print relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="തിരയുക (Search)..." 
                class="w-full pl-12 p-3.5 rounded-2xl border-2 border-slate-200 outline-none focus:border-green-500 font-bold text-slate-800 shadow-sm transition">
        </div>
        
        <div id="loadingStatus" class="text-center py-10 font-bold text-slate-400 uppercase text-xs">Loading items...</div>
        <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-green-700 text-white p-4 shadow-[0_-4px_15px_rgba(0,0,0,0.2)] z-[60] no-print flex justify-between items-center cursor-pointer" onclick="toggleCart()">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-shopping-basket"></i></div>
            <div>
                <div class="font-black text-sm uppercase">Bill Details</div>
                <div class="text-[11px] font-bold opacity-80"><span id="itemCount">0</span> Items</div>
            </div>
        </div>
        <div class="text-right">
            <div class="text-2xl font-black">₹<span id="grandTotal">0</span></div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 bg-white h-[85vh] rounded-t-[2.5rem] z-[70] transform translate-y-full flex flex-col no-print border-t">
        <div class="w-12 h-1.5 bg-slate-300 rounded-full mx-auto mt-3 mb-1"></div>
        <div class="px-6 py-4 border-b flex justify-between items-center">
            <span class="font-black text-xl text-slate-800">Current Bill</span>
            <button onclick="toggleCart()" class="text-slate-400 text-3xl"><i class="fas fa-times-circle"></i></button>
        </div>
        <div id="cartList" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-slate-50 space-y-3 rounded-t-3xl border-t">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="font-black text-slate-500 uppercase text-xs">Grand Total:</span>
                <span class="font-black text-2xl text-green-700">₹<span id="sideTotal">0</span></span>
            </div>
            <button onclick="sendWhatsAppOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-xl"></i> Order Via WhatsApp
            </button>
            <button onclick="clearCart()" class="w-full py-1 text-red-500 font-black text-xs uppercase">Clear All Items</button>
        </div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-[110] backdrop-blur-sm p-4">
        <div class="bg-white p-6 rounded-3xl w-full max-w-xs shadow-2xl text-center">
            <div id="qtyIcon" class="text-5xl mb-3"></div>
            <h3 id="qtyTitle" class="text-xl font-black text-slate-800 uppercase"></h3>
            <p id="qtyTitleML" class="text-sm font-bold text-slate-500 mb-4"></p>
            <input type="number" id="qtyInput" class="w-full text-center text-3xl font-black p-4 bg-slate-100 rounded-2xl mb-4 outline-none" value="1" step="0.01">
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setQty(0.100)" class="bg-slate-100 py-2 rounded-xl text-[10px] font-black uppercase">100g</button>
                <button onclick="setQty(0.250)" class="bg-slate-100 py-2 rounded-xl text-[10px] font-black uppercase">250g</button>
                <button onclick="setQty(0.500)" class="bg-slate-100 py-2 rounded-xl text-[10px] font-black uppercase">500g</button>
            </div>
            <div class="flex gap-2">
                <button onclick="confirmAddToCart()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black">ADD</button>
                <button onclick="closeQtyModal()" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-2xl font-black">BACK</button>
            </div>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-slate-900 hidden z-[200] flex-col p-6 overflow-y-auto no-print">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black text-white uppercase italic">Admin Panel</h2>
            <button onclick="closeAdmin()" class="text-white text-3xl">&times;</button>
        </div>

        <div id="adminLoginSection" class="max-w-xs mx-auto text-center py-20">
            <p class="text-slate-400 mb-4 font-bold text-xs">ENTER ADMIN PIN</p>
            <input type="password" id="adminPin" class="w-full bg-slate-800 border-2 border-slate-700 p-4 rounded-2xl text-center text-white text-2xl tracking-[0.5em] outline-none">
            <button onclick="verifyPin()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black mt-4 uppercase">Login</button>
        </div>

        <div id="adminWorkSection" class="hidden max-w-2xl mx-auto w-full">
            <div class="bg-slate-800 p-6 rounded-3xl mb-6 border border-slate-700">
                <h3 class="font-black text-green-400 mb-4 uppercase text-xs">Add New Item</h3>
                <div class="space-y-3">
                    <input type="text" id="newItemName" placeholder="English Name" class="w-full p-3 rounded-xl bg-slate-900 text-white outline-none">
                    <input type="text" id="newItemML" placeholder="മലയാളം പേര്" class="w-full p-3 rounded-xl bg-slate-900 text-white outline-none">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="newItemPrice" placeholder="Price (₹)" class="w-full p-3 rounded-xl bg-slate-900 text-white outline-none">
                        <input type="text" id="newItemEmoji" placeholder="Emoji (🥦)" class="w-full p-3 rounded-xl bg-slate-900 text-white outline-none">
                    </div>
                    <button onclick="addNewItem()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase">Add to Shop</button>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <h3 class="font-black text-slate-400 mb-4 uppercase text-xs">Inventory (Change Price Below)</h3>
                <div id="adminItemList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let vegetables = [];
        let cart = [];
        const MASTER_PIN = "8589";

        async function initApp() {
            const loading = document.getElementById('loadingStatus');
            try {
                const response = await fetch('https://price-update-pi.vercel.app/api/items');
                const result = await response.json();
                if (result && result.data) {
                    vegetables = result.data;
                    localStorage.setItem('vegInventory', JSON.stringify(vegetables));
                    loading.style.display = 'none';
                }
            } catch (e) {
                vegetables = JSON.parse(localStorage.getItem('vegInventory')) || [];
                loading.innerText = "";
            } finally { renderList(); updateCartUI(); }
        }

        function renderList() {
            const container = document.getElementById('vegContainer');
            container.innerHTML = vegetables.map((v, i) => `
                <div class="bg-white border border-slate-200 p-4 rounded-2xl text-center shadow-sm active:scale-95 transition cursor-pointer flex flex-col justify-between" onclick="openQtyModal(${i})">
                    <div>
                        <div class="text-4xl mb-2">${v.image || '🥦'}</div>
                        <div class="font-black text-slate-800 text-xs truncate uppercase">${v.name_ml || v.name}</div>
                        <div class="text-green-600 font-black text-lg mt-1">₹${v.price}</div>
                    </div>
                    <div class="mt-3 pt-2 border-t border-slate-100 text-[9px] text-slate-400 font-bold uppercase">
                        Updated: ${v.updated_at ? new Date(v.updated_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Today'}
                    </div>
                </div>
            `).join('');
        }

        function updateCartUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            document.getElementById('itemCount').innerText = cart.length;
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('sideTotal').innerText = total.toFixed(2);
            const list = document.getElementById('cartList');
            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase text-xs">Empty</div>`;
                return;
            }
            list.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border-l-4 border-green-500 shadow-sm">
                    <div><div class="font-black text-slate-800 text-sm uppercase">${item.name}</div><div class="text-[11px] font-bold text-slate-400">${item.qty}kg x ₹${item.price}</div></div>
                    <div class="flex items-center gap-4"><span class="font-black text-green-700 text-lg">₹${item.total.toFixed(2)}</span><button onclick="event.stopPropagation(); cart.splice(${i},1); updateCartUI();" class="text-red-400 p-2"><i class="fas fa-trash-alt"></i></button></div>
                </div>
            `).join('');
        }

        function openAdminLogin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        function verifyPin() {
            if(document.getElementById('adminPin').value === MASTER_PIN) {
                document.getElementById('adminLoginSection').classList.add('hidden');
                document.getElementById('adminWorkSection').classList.remove('hidden');
                renderAdminItems();
            } else { alert("Wrong PIN!"); }
        }

        function renderAdminItems() {
            const list = document.getElementById('adminItemList');
            list.innerHTML = vegetables.map((v, i) => `
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2"><span class="text-xl">${v.image}</span><span class="text-white font-bold text-sm">${v.name_ml || v.name}</span></div>
                        <button onclick="deleteItem(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 text-[10px] font-black uppercase">Price ₹</span>
                        <input type="number" value="${v.price}" onchange="updatePrice(${i}, this.value)" class="w-full bg-slate-800 border border-slate-700 text-green-400 font-black p-2 rounded-lg outline-none">
                    </div>
                </div>
            `).join('');
        }

        function updatePrice(index, newPrice) {
            if(newPrice > 0) {
                vegetables[index].price = parseFloat(newPrice);
                vegetables[index].updated_at = new Date().toISOString();
                renderList();
                alert("Price Updated!");
            }
        }

        function addNewItem() {
            const name = document.getElementById('newItemName').value;
            const name_ml = document.getElementById('newItemML').value;
            const price = document.getElementById('newItemPrice').value;
            const image = document.getElementById('newItemEmoji').value || '🥦';
            if(!name || !price) return alert("Fill required fields");
            vegetables.unshift({ name, name_ml, price: parseFloat(price), image, updated_at: new Date().toISOString() });
            renderList(); renderAdminItems();
            alert("Added!");
            document.getElementById('newItemName').value = ''; document.getElementById('newItemML').value = ''; document.getElementById('newItemPrice').value = '';
        }

        function deleteItem(i) { if(confirm("Delete?")) { vegetables.splice(i,1); renderList(); renderAdminItems(); } }
        function sendWhatsAppOrder() {
            if(cart.length === 0) return;
            let msg = "🛒 *NEW ORDER*\n";
            cart.forEach(item => msg += `• ${item.name} (${item.qty}kg) - ₹${item.total.toFixed(2)}\n`);
            msg += `*Total: ₹${document.getElementById('sideTotal').innerText}*`;
            window.open(`https://wa.me/918589944310?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('show-cart'); }
        function openQtyModal(i) {
            selectedVeg = vegetables[i];
            document.getElementById('qtyTitle').innerText = selectedVeg.name;
            document.getElementById('qtyTitleML').innerText = selectedVeg.name_ml || "";
            document.getElementById('qtyIcon').innerText = selectedVeg.image || '🥦';
            document.getElementById('qtyInput').value = 1;
            document.getElementById('qtyModal').style.display = 'flex';
        }
        function closeQtyModal() { document.getElementById('qtyModal').style.display = 'none'; }
        function setQty(v) { document.getElementById('qtyInput').value = v; }
        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            if(q > 0) {
                cart.push({ name: selectedVeg.name_ml || selectedVeg.name, price: selectedVeg.price, qty: q, total: selectedVeg.price * q });
                updateCartUI(); closeQtyModal();
            }
        }
        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('#vegContainer > div');
            vegetables.forEach((v, i) => {
                const match = v.name.toLowerCase().includes(q) || (v.name_ml || "").toLowerCase().includes(q);
                if(items[i]) items[i].style.display = match ? 'flex' : 'none';
            });
        }
        setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleString('en-IN', {dateStyle: 'medium', timeStyle: 'short'}); }, 1000);
        initApp();
    </script>
</body>
    </html>
