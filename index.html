<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochachan 🍅 Vegetable And Fruits 🍇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Manjari', sans-serif; 
            transition: background-color 0.4s ease, color 0.4s ease; 
            overflow-x: hidden; 
        }
        
        /* Glassmorphism Styles */
        .glass-nav {
            background: rgba(22, 101, 52, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .glass-bottom {
            background: rgba(21, 128, 61, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        /* Dark Mode Enhancements */
        .dark-mode { background-color: #020617 !important; color: #f8fafc; }
        .dark-mode .glass-card { 
            background: rgba(30, 41, 59, 0.6) !important; 
            border-color: rgba(255, 255, 255, 0.05); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .dark-mode .text-slate-800 { color: #f1f5f9 !important; }
        .dark-mode .text-slate-500 { color: #94a3b8 !important; }
        .dark-mode .bg-slate-50 { background-color: #0f172a !important; }
        .dark-mode #cartSidebar, .dark-mode .modal-bg { background-color: #1e293b !important; color: white; }
        .dark-mode input { background-color: #334155 !important; color: white !important; border-color: #475569 !important; }
        .dark-mode .modal-btn-light { background-color: #334155 !important; color: #f1f5f9 !important; }
        
        /* Animations */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 18s linear infinite; }
        #cartSidebar { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .show-cart { transform: translateY(0) !important; }
        
        /* Smooth interactions */
        .hover-scale { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-scale:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-28" id="mainBody">

    <header class="glass-nav text-white p-4 sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-2">
            <div class="h-10 w-10"></div> 
            
            <div class="text-center">
                <h1 class="text-2xl font-black tracking-tight leading-none uppercase drop-shadow-md">Kochachan</h1>
                <div class="text-[11px] font-bold tracking-widest uppercase text-green-200 mt-0.5">Vegetable & Fruits</div>
                <div id="liveTime" class="text-[10px] font-medium opacity-90 mt-1 uppercase bg-black/20 inline-block px-3 py-1 rounded-full backdrop-blur-sm"></div>
            </div>
            
            <button onclick="toggleDarkMode()" class="bg-white/10 h-10 w-10 rounded-xl flex items-center justify-center hover:bg-white/20 transition-all duration-300 backdrop-blur-sm border border-white/10">
                <i class="fas fa-moon text-lg"></i>
            </button>
        </div>
    </header>

    <div class="bg-yellow-400 overflow-hidden py-1.5 shadow-inner no-print border-b border-yellow-500/50">
        <div class="animate-marquee">
            <span class="text-green-900 font-black text-sm uppercase tracking-wide">
                🌼 Happy Vishu 🌼 | ഏവർക്കും ഐശ്വര്യപൂർണ്ണമായ വിഷു ആശംസകൾ! 🥬🍅🥕🧅🥔 | FRESH ITEMS AVAILABLE TODAY
            </span>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 mt-2">
        <div class="mb-6 no-print relative group">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-green-500 transition-colors"></i>
            <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="തിരയുക (Search items)..." 
                class="w-full pl-14 p-4 rounded-2xl border-2 border-slate-200/80 outline-none focus:border-green-500 focus:ring-4 focus:ring-green-500/10 font-bold text-slate-800 shadow-sm transition-all bg-white/80 backdrop-blur-sm">
        </div>
        
        <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 glass-bottom text-white p-4 z-[60] no-print flex justify-between items-center cursor-pointer hover:bg-green-700 transition-colors duration-300" onclick="toggleCart()">
        <div class="flex items-center gap-4 max-w-7xl mx-auto w-full justify-between px-2">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2.5 rounded-xl backdrop-blur-sm border border-white/10 relative">
                    <i class="fas fa-shopping-basket text-lg"></i>
                    <span id="badgeCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-lg hidden">0</span>
                </div>
                <div>
                    <div class="font-black text-sm uppercase tracking-wider">View Bill</div>
                    <div class="text-[11px] font-bold opacity-80"><span id="itemCount">0</span> Items Selected</div>
                </div>
            </div>
            <div class="text-right bg-black/20 px-4 py-1.5 rounded-xl backdrop-blur-sm">
                <div class="text-sm font-medium opacity-80 uppercase text-[10px] mb-[-4px]">Total</div>
                <div class="text-2xl font-black">₹<span id="grandTotal">0</span></div>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 modal-bg bg-white h-[85vh] rounded-t-[2.5rem] z-[70] transform translate-y-full flex flex-col no-print shadow-[0_-10px_40px_rgba(0,0,0,0.15)] border-t border-slate-100">
        <div class="w-16 h-1.5 bg-slate-300 rounded-full mx-auto mt-4 mb-2"></div>
        <div class="px-6 py-4 flex justify-between items-center border-b border-slate-100">
            <span class="font-black text-2xl text-slate-800 uppercase tracking-tight">Current Bill</span>
            <button onclick="toggleCart()" class="text-slate-400 text-3xl hover:text-red-500 transition-colors bg-slate-100 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartList" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50"></div>
        <div class="p-6 bg-white space-y-4 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.02)] z-10 border-t border-slate-100">
            <div class="flex justify-between items-end mb-2 px-2 bg-green-50 p-4 rounded-2xl border border-green-100 dark:bg-slate-800/50 dark:border-slate-700">
                <span class="font-black text-green-800/70 uppercase text-xs tracking-wider">Grand Total</span>
                <span class="font-black text-3xl text-green-700">₹<span id="sideTotal">0</span></span>
            </div>
            <button onclick="sendWhatsAppOrder()" class="w-full bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-500/30 uppercase flex items-center justify-center gap-3 transition-all transform hover:scale-[1.02]">
                <i class="fab fa-whatsapp text-2xl"></i> Send via WhatsApp
            </button>
            <button onclick="clearCart()" class="w-full py-2 text-slate-400 hover:text-red-500 font-bold text-xs uppercase tracking-widest transition-colors">Clear All Items</button>
        </div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[110] backdrop-blur-md p-4 transition-opacity duration-300 opacity-0" style="transition: opacity 0.3s ease;">
        <div class="modal-bg bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center transform scale-95 transition-transform duration-300" id="qtyModalContent">
            <div id="qtyIcon" class="text-6xl mb-4 drop-shadow-xl"></div>
            <h3 id="qtyTitle" class="text-2xl font-black text-slate-800 uppercase tracking-tight"></h3>
            <p id="qtyTitleML" class="text-base font-bold text-slate-500 mb-6"></p>
            
            <div class="relative mb-6">
                <input type="number" id="qtyInput" class="w-full text-center text-4xl font-black p-4 bg-slate-100 rounded-3xl outline-none focus:ring-4 focus:ring-green-500/20 transition-all border border-slate-200" value="1" step="0.01">
                <span class="absolute right-6 top-1/2 -translate-y-1/2 font-bold text-slate-400 uppercase text-sm">KG</span>
            </div>
            
            <div class="grid grid-cols-4 gap-2 mb-8">
                <button onclick="setQty(0.100)" class="modal-btn-light bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl text-[11px] font-black uppercase transition-colors">100g</button>
                <button onclick="setQty(0.250)" class="modal-btn-light bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl text-[11px] font-black uppercase transition-colors">250g</button>
                <button onclick="setQty(0.500)" class="modal-btn-light bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl text-[11px] font-black uppercase transition-colors">500g</button>
                <button onclick="setQty(0.750)" class="modal-btn-light bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl text-[11px] font-black uppercase transition-colors">750g</button>
            </div>
            
            <div class="flex gap-3">
                <button onclick="closeQtyModal()" class="flex-1 modal-btn-light bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-2xl font-black uppercase tracking-wider transition-colors">Cancel</button>
                <button onclick="confirmAddToCart()" class="flex-1 bg-green-600 hover:bg-green-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-500/30 uppercase tracking-wider transition-all">Add to Cart</button>
            </div>
        </div>
    </div>

    <script>
        // Static array of items (API completely removed)
        const vegetables = [
            {"id":1,"name":"Tomato","name_ml":"തക്കാളി","price":40,"image":"🍅"},
            {"id":2,"name":"Potato","name_ml":"ഉരുളക്കിഴങ്ങ്","price":22,"image":"🥔"},
            {"id":3,"name":"Onion","name_ml":"സവാള","price":32,"image":"🧅"},
            {"id":4,"name":"Carrot","name_ml":"കാരറ്റ്","price":50,"image":"🥕"},
            {"id":5,"name":"Cabbage","name_ml":"കാബേജ്","price":25,"image":"🥬"},
            {"id":6,"name":"Banana","name_ml":"വാഴപ്പഴം","price":50,"image":"🍌"},
            {"id":7,"name":"Mango","name_ml":"മാങ്ങ","price":500,"image":"🥭"},
            {"id":8,"name":"Brinjal","name_ml":"വഴുതന","price":45,"image":"🍆"},
            {"id":9,"name":"Beans","name_ml":"ബീൻസ്","price":60,"image":"🫘"},
            {"id":10,"name":"Apple","name_ml":"ആപ്പിൾ","price":180,"image":"🍎"},
            {"id":11,"name":"Orange","name_ml":"ഓറഞ്ച്","price":120,"image":"🍊"},
            {"id":12,"name":"Pineapple","name_ml":"കൈതച്ചക്ക","price":90,"image":"🍍"},
            {"id":13,"name":"Papaya","name_ml":"പപ്പായ","price":60,"image":"🥭"},
            {"id":14,"name":"Watermelon","name_ml":"തണ്ണിമത്തൻ","price":30,"image":"🍉"},
            {"id":15,"name":"Grapes","name_ml":"മുന്തിരി","price":90,"image":"🍇"},
            {"id":16,"name":"Guava","name_ml":"പേരയ്ക്ക","price":70,"image":"🍏"},
            {"id":17,"name":"Chili","name_ml":"മുളക്","price":80,"image":"🌶️"},
            {"id":18,"name":"Cucumber","name_ml":"വെള്ളരി","price":35,"image":"🥒"},
            {"id":19,"name":"Drumstick","name_ml":"മുരിങ്ങക്കായ്","price":70,"image":"🥬"},
            {"id":20,"name":"Pumpkin","name_ml":"മത്തങ്ങ","price":40,"image":"🎃"},
            {"id":30,"name":"Garlic","name_ml":"വെളുത്തുള്ളി","price":120,"image":"🧄"},
            {"id":31,"name":"Ginger","name_ml":"ഇഞ്ചി","price":100,"image":"🫚"}
        ]; // You can add the rest of your items here naturally

        let cart = [];
        let selectedVeg = null;

        function initApp() {
            renderList();
            updateCartUI();
        }

        function renderList() {
            const container = document.getElementById('vegContainer');
            container.innerHTML = vegetables.map((v, i) => `
                <div class="glass-card hover-scale p-5 rounded-[1.5rem] text-center cursor-pointer flex flex-col justify-between h-full" onclick="openQtyModal(${i})">
                    <div class="flex flex-col items-center justify-center flex-1">
                        <div class="text-5xl mb-4 drop-shadow-md transition-transform group-hover:scale-110">${v.image || '🥦'}</div>
                        <div class="font-black text-slate-800 text-[13px] uppercase tracking-wide leading-tight mb-1">${v.name_ml || v.name}</div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase mb-3">${v.name}</div>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl py-2 mt-auto border border-slate-100 dark:border-slate-700/50">
                        <div class="text-green-600 dark:text-green-400 font-black text-lg">₹${v.price}<span class="text-[9px] text-slate-400 ml-1 uppercase">/KG</span></div>
                    </div>
                </div>
            `).join('');
        }

        function updateCartUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            const count = cart.length;
            
            document.getElementById('itemCount').innerText = count;
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('sideTotal').innerText = total.toFixed(2);
            
            // Update Badge
            const badge = document.getElementById('badgeCount');
            if (count > 0) {
                badge.innerText = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            const list = document.getElementById('cartList');
            if(count === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 flex flex-col items-center justify-center">
                        <div class="text-5xl mb-4 opacity-20">🛒</div>
                        <div class="text-slate-400 font-black uppercase text-sm tracking-widest">Cart is Empty</div>
                        <div class="text-slate-300 text-xs mt-2 font-bold">Add some fresh veggies!</div>
                    </div>`;
                return;
            }
            
            list.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-slate-50 dark:bg-slate-700 rounded-xl flex items-center justify-center text-2xl border border-slate-100 dark:border-slate-600">${item.image || '🥦'}</div>
                        <div>
                            <div class="font-black text-slate-800 dark:text-slate-100 text-sm uppercase">${item.name}</div>
                            <div class="text-xs font-bold text-slate-400 bg-slate-50 dark:bg-slate-700 inline-block px-2 py-0.5 rounded-md mt-1">${item.qty}kg × ₹${item.price}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-slate-800 dark:text-slate-100 text-lg">₹${item.total.toFixed(2)}</span>
                        <button onclick="event.stopPropagation(); cart.splice(${i},1); updateCartUI();" class="text-red-400 hover:text-white hover:bg-red-500 p-2.5 rounded-xl transition-colors bg-red-50 dark:bg-red-900/20">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function sendWhatsAppOrder() {
            if(cart.length === 0) {
                alert("Cart is empty!");
                return;
            }

            let message = "🛒 *പുതിയ ഓർഡർ - Kochachan 🌶️ Vegetable And Fruits 🍉* 🛒\n";
            message += "━━━━━━━━━━━━━━━━━━\n";
            
            cart.forEach((item, index) => {
                message += `${index + 1}. *${item.name}* 📦\n`;
                message += `   ${item.qty}kg × ₹${item.price} = *₹${item.total.toFixed(2)}*\n`;
            });

            const grandTotal = cart.reduce((s, c) => s + c.total, 0);
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `💰 *ആകെ തുക: ₹${grandTotal.toFixed(2)}*\n`;
            message += "━━━━━━━━━━━━━━━━━━\n";
            
            // Formatted Date & Time for WhatsApp Bill
            const dateOptions = { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            message += `📅 Date: ${new Date().toLocaleString('en-IN', dateOptions)}\n\n`;
            message += "✅ *ഓർഡർ കൺഫേം ചെയ്യുക.*";

            const encodedMsg = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/918589944310?text=${encodedMsg}`;
            
            window.open(whatsappUrl, '_blank');
        }

        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('vegContainer');
            const items = container.querySelectorAll('.glass-card');
            vegetables.forEach((v, i) => {
                const name = (v.name || "").toLowerCase();
                const nameML = (v.name_ml || "").toLowerCase();
                const match = name.includes(q) || nameML.includes(q);
                if(items[i]) {
                    items[i].style.display = match ? 'flex' : 'none';
                    if(match) {
                        items[i].style.animation = "fadeIn 0.3s ease";
                    }
                }
            });
        }

        function toggleDarkMode() { 
            document.getElementById('mainBody').classList.toggle('dark-mode'); 
        }
        
        function toggleCart() { 
            document.getElementById('cartSidebar').classList.toggle('show-cart'); 
        }

        function openQtyModal(i) {
            selectedVeg = vegetables[i];
            document.getElementById('qtyTitle').innerText = selectedVeg.name;
            document.getElementById('qtyTitleML').innerText = selectedVeg.name_ml || "";
            document.getElementById('qtyIcon').innerText = selectedVeg.image || '🥦';
            document.getElementById('qtyInput').value = 1;
            
            const modal = document.getElementById('qtyModal');
            const content = document.getElementById('qtyModalContent');
            
            modal.style.display = 'flex';
            // Slight delay for smooth animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeQtyModal() { 
            const modal = document.getElementById('qtyModal');
            const content = document.getElementById('qtyModalContent');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        function setQty(v) { 
            document.getElementById('qtyInput').value = v; 
            // Add a small visual feedback
            const input = document.getElementById('qtyInput');
            input.style.transform = "scale(1.05)";
            setTimeout(() => input.style.transform = "scale(1)", 150);
        }

        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            if(q > 0) {
                cart.push({ 
                    name: selectedVeg.name_ml || selectedVeg.name, 
                    price: selectedVeg.price, 
                    qty: q, 
                    total: selectedVeg.price * q,
                    image: selectedVeg.image
                });
                updateCartUI(); 
                closeQtyModal();
            }
        }

        function clearCart() { 
            if(confirm("Are you sure you want to clear the bill?")) { 
                cart = []; 
                updateCartUI(); 
            } 
        }

        // Professional Live Time formatting with Seconds and Date
        setInterval(() => { 
            const now = new Date();
            const options = { 
                day: '2-digit', 
                month: 'short', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: true 
            };
            document.getElementById('liveTime').innerText = now.toLocaleString('en-IN', options); 
        }, 1000);

        // Start the app
        initApp();
    </script>
</body>
</html>
