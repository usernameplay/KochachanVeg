<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochachan Market 🍅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Manjari', sans-serif; transition: background 0.4s; overflow-x: hidden; }
        .dark-mode { background-color: #020617 !important; color: #f8fafc; }
        .dark-mode .bg-card { background-color: #1e293b !important; border-color: #334155 !important; }
        .dark-mode .text-main { color: #f1f5f9 !important; }
        .dark-mode .text-sub { color: #94a3b8 !important; }
        
        .glass-header { background: rgba(21, 128, 61, 0.95); backdrop-filter: blur(10px); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2rem; }
        .product-card:hover { transform: translateY(-5px); shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .tab-active { background-color: #166534; color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .show-cart { transform: translateY(0) !important; }
        
        /* Custom Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #toast { visibility: hidden; min-width: 200px; background-color: #16a34a; color: #fff; text-align: center; border-radius: 12px; padding: 12px; position: fixed; z-index: 200; left: 50%; bottom: 120px; transform: translateX(-50%); font-weight: bold; }
        #toast.show { visibility: visible; animation: slideup 0.4s, slidedown 0.4s 2.5s; }
        @keyframes slideup { from {bottom: 0; opacity: 0;} to {bottom: 120px; opacity: 1;} }
        @keyframes slidedown { from {bottom: 120px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32" id="mainBody">

    <div id="toast">ലിസ്റ്റിലേക്ക് ചേർത്തു! 🥬</div>

    <header class="glass-header sticky top-0 z-50 text-white p-5 shadow-lg rounded-b-[2.5rem]">
        <div class="max-w-7xl mx-auto flex flex-col items-center">
            <h1 class="text-2xl font-black tracking-tight flex items-center gap-2 uppercase">
                KOCHACHAN <span class="bg-white/20 px-2 py-0.5 rounded-lg text-sm">MARKET</span>
            </h1>
            <div id="billDateTime" class="text-[10px] font-bold opacity-70 mt-1 uppercase"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <div class="sticky top-24 z-40 bg-slate-50/80 backdrop-blur-md pt-2 pb-4 no-print">
            <div class="relative mb-4">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="തിരയുക (Search)..." 
                    class="w-full pl-12 p-4 rounded-2xl border-none shadow-md outline-none focus:ring-2 focus:ring-green-500 font-bold text-slate-800">
            </div>
            
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="filterCategory('all')" id="tab-all" class="tab-active px-6 py-2 rounded-full font-bold text-sm whitespace-nowrap transition">എല്ലാം</button>
                <button onclick="filterCategory('veg')" id="tab-veg" class="bg-white text-slate-600 px-6 py-2 rounded-full font-bold text-sm whitespace-nowrap shadow-sm border border-slate-100 transition">പച്ചക്കറികൾ</button>
                <button onclick="filterCategory('fruit')" id="tab-fruit" class="bg-white text-slate-600 px-6 py-2 rounded-full font-bold text-sm whitespace-nowrap shadow-sm border border-slate-100 transition">പഴങ്ങൾ</button>
            </div>
        </div>
        
        <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-20 font-bold text-slate-400">ലോഡ് ചെയ്യുന്നു...</div>
        </div>
    </main>

    <div class="fixed bottom-0 inset-x-0 p-4 z-[60] no-print">
        <div class="max-w-lg mx-auto bg-green-700 text-white p-4 rounded-[2.5rem] shadow-2xl flex justify-between items-center cursor-pointer active:scale-95 transition" onclick="toggleCart()">
            <div class="flex items-center gap-4">
                <div id="basketIcon" class="bg-white/20 p-3 rounded-2xl relative">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-500 text-[10px] px-2 py-0.5 rounded-full border-2 border-green-700 hidden">0</span>
                </div>
                <div>
                    <div class="text-[10px] opacity-70 font-bold uppercase tracking-widest">Total Amount</div>
                    <div class="text-xl font-black">₹<span id="grandTotal">0</span></div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="event.stopPropagation(); toggleDarkMode();" class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center">
                    <i class="fas fa-adjust text-sm"></i>
                </button>
                <div class="bg-white text-green-700 px-5 py-2.5 rounded-2xl font-black text-xs uppercase tracking-wider shadow-sm">View List</div>
            </div>
        </div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[110] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-[3rem] w-full max-w-sm shadow-2xl text-center border-t-8 border-green-600">
            <div id="qtyImgContainer" class="text-6xl mb-4"></div>
            <h3 id="qtyTitle" class="text-2xl font-black dark:text-white uppercase"></h3>
            <p id="qtyTitleML" class="text-green-600 font-bold mb-6 text-sm"></p>
            
            <div class="flex items-center justify-between bg-slate-100 dark:bg-slate-700 p-2 rounded-2xl mb-6">
                <button onclick="adjustQty(-0.25)" class="w-12 h-12 rounded-xl bg-white dark:bg-slate-600 shadow-sm flex items-center justify-center text-xl font-bold">-</button>
                <input type="number" id="qtyInput" class="bg-transparent text-center text-3xl font-black w-24 outline-none" value="1" step="0.25">
                <button onclick="adjustQty(0.25)" class="w-12 h-12 rounded-xl bg-green-600 text-white shadow-md flex items-center justify-center text-xl font-bold">+</button>
            </div>

            <div class="grid grid-cols-4 gap-2 mb-8">
                <button onclick="setQty(0.25)" class="bg-slate-50 dark:bg-slate-700 p-2 rounded-xl text-[10px] font-bold">250g</button>
                <button onclick="setQty(0.5)" class="bg-slate-50 dark:bg-slate-700 p-2 rounded-xl text-[10px] font-bold">500g</button>
                <button onclick="setQty(1)" class="bg-slate-50 dark:bg-slate-700 p-2 rounded-xl text-[10px] font-bold">1kg</button>
                <button onclick="setQty(2)" class="bg-slate-50 dark:bg-slate-700 p-2 rounded-xl text-[10px] font-bold">2kg</button>
            </div>
            
            <div class="flex gap-3">
                <button onclick="confirmAddToCart()" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg">ADD TO LIST</button>
                <button onclick="closeQtyModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-500 py-4 rounded-2xl font-bold uppercase text-[10px]">Back</button>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 bg-white dark:bg-slate-900 h-[92vh] rounded-t-[3rem] z-[70] transform translate-y-full transition-transform duration-500 flex flex-col border-t shadow-2xl">
        <div class="w-16 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mt-4 mb-2" onclick="toggleCart()"></div>
        <div class="px-8 py-4 flex justify-between items-center">
            <h2 class="text-2xl font-black dark:text-white uppercase tracking-tight">Shopping List</h2>
            <button onclick="toggleCart()" class="w-10 h-10 bg-slate-100 dark:bg-slate-700 rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-6 py-2" id="cartList"></div>

        <div id="trackingContainer" class="px-8 hidden">
            <div class="bg-green-50 dark:bg-green-900/10 p-5 rounded-[2rem] mb-4 border border-green-100 dark:border-green-900/30">
                <div class="flex justify-between items-center relative">
                    <div class="flex flex-col items-center z-10">
                        <div class="w-8 h-8 rounded-full bg-green-600 text-white flex items-center justify-center text-[10px]"><i class="fas fa-check"></i></div>
                        <span class="text-[8px] font-black mt-1 uppercase text-green-700">Received</span>
                    </div>
                    <div class="flex-1 h-1 bg-slate-200 dark:bg-slate-700 mx-[-5px] mb-4"></div>
                    <div class="flex flex-col items-center z-10">
                        <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 text-white flex items-center justify-center text-[10px]"><i class="fas fa-box"></i></div>
                        <span class="text-[8px] font-black mt-1 uppercase text-slate-400">Packed</span>
                    </div>
                    <div class="flex-1 h-1 bg-slate-200 dark:bg-slate-700 mx-[-5px] mb-4"></div>
                    <div class="flex flex-col items-center z-10">
                        <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 text-white flex items-center justify-center text-[10px]"><i class="fas fa-truck"></i></div>
                        <span class="text-[8px] font-black mt-1 uppercase text-slate-400">On Way</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-8 bg-slate-50 dark:bg-slate-800 rounded-t-[3rem] border-t dark:border-slate-700 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest">Name</label>
                    <input type="text" id="custName" placeholder="പേര്" class="w-full p-4 rounded-2xl border-none shadow-sm outline-none focus:ring-2 focus:ring-green-500 dark:bg-slate-700">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest">Location</label>
                    <input type="text" id="custPlace" placeholder="സ്ഥലം" class="w-full p-4 rounded-2xl border-none shadow-sm outline-none focus:ring-2 focus:ring-green-500 dark:bg-slate-700">
                </div>
            </div>

            <button onclick="sendWhatsAppOrder()" class="w-full bg-green-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl flex items-center justify-center gap-3 active:scale-95 transition uppercase tracking-tighter">
                <i class="fab fa-whatsapp text-2xl"></i> Send WhatsApp Order
            </button>
        </div>
    </div>

    <script>
        const apiURL = "https://price-update-pi.vercel.app/api/veg";
        let vegetables = [];
        let cart = [];
        let selectedVeg = null;
        let currentTab = 'all';

        async function loadData() {
            try {
                const response = await fetch(apiURL);
                vegetables = await response.json();
                renderList(vegetables);
            } catch (e) {
                const proxy = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiURL)}&t=${Date.now()}`);
                const res = await proxy.json();
                vegetables = JSON.parse(res.contents);
                renderList(vegetables);
            }
        }

        function renderList(items) {
            const container = document.getElementById('vegContainer');
            if(items.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 font-bold uppercase text-xs">No items found</div>`;
                return;
            }
            container.innerHTML = items.map((v) => {
                const origIdx = vegetables.indexOf(v);
                return `
                <div class="bg-card product-card p-5 rounded-[2.5rem] text-center border border-slate-100 dark:border-slate-800 shadow-sm cursor-pointer active:scale-95 transition" onclick="openQtyModal(${origIdx})">
                    <div class="text-5xl mb-3 drop-shadow-md">${v.emoji || '🥗'}</div>
                    <div class="font-black text-slate-800 dark:text-white text-xs uppercase leading-tight h-8 flex items-center justify-center mb-1">${v.name_ml || v.name_en}</div>
                    <div class="text-green-600 font-black text-xl mb-1">₹${v.price}</div>
                    <div class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${v.unit || 'Per KG'}</div>
                </div>`;
            }).join('');
        }

        function filterCategory(cat) {
            currentTab = cat;
            document.querySelectorAll('[id^="tab-"]').forEach(btn => btn.className = "bg-white text-slate-600 px-6 py-2 rounded-full font-bold text-sm shadow-sm border border-slate-100 transition");
            document.getElementById(`tab-${cat}`).className = "tab-active px-6 py-2 rounded-full font-bold text-sm transition";
            
            const filtered = cat === 'all' ? vegetables : vegetables.filter(v => v.category === cat);
            renderList(filtered);
        }

        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = vegetables.filter(v => 
                (v.name_en + v.name_ml).toLowerCase().includes(q) && (currentTab === 'all' || v.category === currentTab)
            );
            renderList(filtered);
        }

        function openQtyModal(idx) {
            selectedVeg = vegetables[idx];
            document.getElementById('qtyTitle').innerText = selectedVeg.name_en;
            document.getElementById('qtyTitleML').innerText = selectedVeg.name_ml;
            document.getElementById('qtyImgContainer').innerText = selectedVeg.emoji || '🥗';
            document.getElementById('qtyInput').value = 1;
            document.getElementById('qtyModal').style.display = 'flex';
        }

        function adjustQty(val) {
            let input = document.getElementById('qtyInput');
            let newVal = parseFloat(input.value) + val;
            if(newVal > 0) input.value = newVal;
        }

        function setQty(v) { document.getElementById('qtyInput').value = v; }
        function closeQtyModal() { document.getElementById('qtyModal').style.display = 'none'; }

        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            const name = selectedVeg.name_ml || selectedVeg.name_en;
            const existing = cart.find(item => item.name === name);

            if(existing) {
                existing.qty += q;
                existing.total = existing.qty * existing.price;
            } else {
                cart.push({ name, price: parseFloat(selectedVeg.price), qty: q, total: parseFloat(selectedVeg.price) * q });
            }
            updateCartUI();
            closeQtyModal();
            showToast();
        }

        function updateCartUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            document.getElementById('grandTotal').innerText = total.toLocaleString('en-IN');
            document.getElementById('cartBadge').innerText = cart.length;
            document.getElementById('cartBadge').classList.toggle('hidden', cart.length === 0);

            const list = document.getElementById('cartList');
            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-24 opacity-20"><i class="fas fa-shopping-cart text-7xl mb-4"></i><p class="font-black uppercase text-xs tracking-widest">List is empty</p></div>`;
                return;
            }

            list.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-5 rounded-[2rem] mb-3 border border-slate-100 dark:border-slate-700">
                    <div class="flex-1">
                        <div class="font-black text-slate-800 dark:text-white text-sm uppercase">${item.name}</div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${item.qty}kg x ₹${item.price}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="font-black text-green-600 text-lg">₹${item.total.toFixed(0)}</div>
                        <button onclick="removeItem(${i})" class="w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/20 text-red-500 flex items-center justify-center transition-transform active:scale-75"><i class="fas fa-trash-alt text-sm"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            updateCartUI();
        }

        function showToast() {
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }

        function sendWhatsAppOrder() {
            if(cart.length === 0) return alert("List is empty!");
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 1000 });
            document.getElementById('trackingContainer').classList.remove('hidden');

            const name = document.getElementById('custName').value || "Guest";
            const place = document.getElementById('custPlace').value || "Not specified";
            const orderID = "KC" + Math.floor(1000 + Math.random() * 9000);

            let msg = `🧾 *KOCHACHAN DIGITAL BILL*\n`;
            msg += `Order ID: #${orderID}\n`;
            msg += `Date: ${new Date().toLocaleDateString()}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━\n`;
            msg += `👤 *Customer:* ${name}\n`;
            msg += `📍 *Location:* ${place}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━\n\n`;
            
            cart.forEach((it, idx) => {
                msg += `✅ *${it.name}*\n   ${it.qty}kg x ₹${it.price} = *₹${it.total.toFixed(0)}*\n\n`;
            });

            msg += `━━━━━━━━━━━━━━━━━━━\n`;
            msg += `💰 *NET TOTAL: ₹${document.getElementById('grandTotal').innerText}*\n`;
            msg += `🛵 *Status:* Order Received! We will notify you when it's out for delivery.\n\n`;
            msg += `🙏 Thank you for shopping with Kochachan!`;
            setTimeout(() => {
            window.open(`https://wa.me/918589944310?text=${encodeURIComponent(msg)}`);
            }, 1000);
            }
           
            function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
            function toggleCart() { document.getElementById('cartSidebar').classList.toggle('show-cart'); }
            
            setInterval(() => { 
            const now = new Date();
            document.getElementById('billDateTime').innerText = now.toLocaleString('en-IN', { weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }); 
            }, 1000);
            
            loadData();
            </script>
            </body>
            </html>
