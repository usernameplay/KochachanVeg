<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochachan Market 🍅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .dark-mode { background-color: #020617 !important; color: #f8fafc; }
        .dark-mode .bg-card { background-color: #1e293b !important; border-color: #334155 !important; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: white; }
        
        .product-card { transition: all 0.3s; border-radius: 2rem; border: 1px solid #e2e8f0; }
        .tab-active { background-color: #166534; color: white; }
        .show-cart { transform: translateY(0) !important; }
        
        #toast { visibility: hidden; min-width: 200px; background-color: #16a34a; color: #fff; text-align: center; border-radius: 12px; padding: 12px; position: fixed; z-index: 200; left: 50%; bottom: 120px; transform: translateX(-50%); font-weight: bold; }
        #toast.show { visibility: visible; animation: slideup 0.5s, slidedown 0.5s 2.5s; }
        @keyframes slideup { from {bottom: 0; opacity: 0;} to {bottom: 120px; opacity: 1;} }
        @keyframes slidedown { from {bottom: 120px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="mainBody">

    <div id="toast">ലിസ്റ്റിലേക്ക് ചേർത്തു! 🥬</div>

    <header class="bg-green-700 sticky top-0 z-50 text-white p-5 shadow-lg rounded-b-[2.5rem]">
        <div class="max-w-7xl mx-auto flex flex-col items-center">
            <h1 class="text-2xl font-black tracking-tight uppercase">KOCHACHAN MARKET</h1>
            <div id="billDateTime" class="text-[10px] font-bold opacity-80 mt-1 uppercase"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <div class="sticky top-24 z-40 bg-slate-50/90 backdrop-blur-md pt-2 pb-4">
            <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="തിരയുക (Search)..." 
                class="w-full p-4 rounded-2xl border shadow-sm outline-none mb-4 font-bold dark:bg-slate-800">
            
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                <button onclick="filterCategory('all')" id="tab-all" class="tab-active px-6 py-2 rounded-full font-bold text-sm whitespace-nowrap border">എല്ലാം</button>
                <button onclick="filterCategory('veg')" id="tab-veg" class="bg-white px-6 py-2 rounded-full font-bold text-sm border whitespace-nowrap">പച്ചക്കറികൾ</button>
                <button onclick="filterCategory('fruit')" id="tab-fruit" class="bg-white px-6 py-2 rounded-full font-bold text-sm border whitespace-nowrap">പഴങ്ങൾ</button>
            </div>
        </div>
        
        <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-20 font-bold text-slate-400">Loading Items...</div>
        </div>
    </main>

    <div class="fixed bottom-0 inset-x-0 p-4 z-[60]">
        <div class="max-w-lg mx-auto bg-green-700 text-white p-4 rounded-[2.5rem] shadow-2xl flex justify-between items-center cursor-pointer" onclick="toggleCart()">
            <div class="flex items-center gap-4">
                <div class="bg-white/20 p-3 rounded-2xl relative">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-500 text-[10px] px-2 py-0.5 rounded-full border-2 border-green-700 hidden">0</span>
                </div>
                <div>
                    <div class="text-[10px] opacity-70 font-bold uppercase">Total</div>
                    <div class="text-xl font-black">₹<span id="grandTotal">0</span></div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="event.stopPropagation(); toggleDarkMode();" class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center">
                    <i class="fas fa-adjust text-sm"></i>
                </button>
                <div class="bg-white text-green-700 px-5 py-2.5 rounded-2xl font-black text-xs uppercase shadow-sm">View List</div>
            </div>
        </div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[110] p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
            <div id="qtyImg" class="text-6xl mb-2"></div>
            <h3 id="qtyTitle" class="text-2xl font-black uppercase dark:text-white"></h3>
            <div class="flex items-center justify-between bg-slate-100 dark:bg-slate-700 p-2 rounded-2xl my-6">
                <button onclick="adjustQty(-0.25)" class="w-12 h-12 bg-white dark:bg-slate-600 rounded-xl font-bold text-xl">-</button>
                <input type="number" id="qtyInput" class="bg-transparent text-center text-2xl font-bold w-20 outline-none dark:text-white" value="1" step="0.25">
                <button onclick="adjustQty(0.25)" class="w-12 h-12 bg-green-600 text-white rounded-xl font-bold text-xl">+</button>
            </div>
            <div class="flex gap-2">
                <button onclick="confirmAddToCart()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Add to List</button>
                <button onclick="closeQtyModal()" class="px-6 bg-slate-200 dark:bg-slate-700 py-4 rounded-2xl font-bold uppercase text-xs">Back</button>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 bg-white dark:bg-slate-900 h-[90vh] rounded-t-[3rem] z-[70] transform translate-y-full transition-transform duration-500 flex flex-col shadow-2xl">
        <div class="w-12 h-1 bg-slate-300 mx-auto mt-4 mb-4" onclick="toggleCart()"></div>
        <div class="px-8 flex justify-between items-center mb-4">
            <h2 class="text-2xl font-black dark:text-white uppercase">Shopping List</h2>
            <button onclick="toggleCart()" class="text-slate-400 text-3xl">&times;</button>
        </div>
        <div id="cartList" class="flex-1 overflow-y-auto px-6"></div>
        <div class="p-6 bg-slate-50 dark:bg-slate-800 rounded-t-[2.5rem] border-t dark:border-slate-700 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="custName" placeholder="പേര് (Name)" class="p-4 rounded-xl border dark:bg-slate-700 dark:text-white font-bold outline-none focus:ring-2 focus:ring-green-500">
                <input type="text" id="custPlace" placeholder="സ്ഥലം (Place)" class="p-4 rounded-xl border dark:bg-slate-700 dark:text-white font-bold outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div class="flex gap-2">
                <button onclick="printReceipt()" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black flex items-center justify-center gap-2 uppercase text-sm">
                    <i class="fas fa-print"></i> Print Bill
                </button>
                <button onclick="sendWhatsAppOrder()" class="flex-1 bg-green-600 text-white py-4 rounded-xl font-black flex items-center justify-center gap-2 uppercase text-sm">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiURL = "https://price-update-pi.vercel.app/api/veg";
        let vegetables = [];
        let cart = [];
        let selectedVeg = null;

        async function loadData() {
            try {
                const response = await fetch(apiURL);
                vegetables = await response.json();
                renderList(vegetables);
            } catch (e) {
                const proxy = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiURL)}&t=${Date.now()}`);
                const res = await proxy.json();
                vegetables = JSON.parse(res.contents);
                renderList(vegetables);
            }
        }

        function renderList(items) {
            const container = document.getElementById('vegContainer');
            container.innerHTML = items.map((v) => `
                <div class="bg-white dark:bg-slate-800 product-card p-5 text-center shadow-sm cursor-pointer active:scale-95" onclick="openQtyModal(${vegetables.indexOf(v)})">
                    <div class="text-4xl mb-2">${v.emoji || '🥗'}</div>
                    <div class="font-bold text-xs mb-1 h-10 flex items-center justify-center dark:text-white uppercase">${v.name_ml || v.name_en}</div>
                    <div class="text-green-600 font-black text-xl">₹${v.price}</div>
                    <div class="text-[9px] text-slate-400 font-bold uppercase">${v.unit || 'Per KG'}</div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            document.querySelectorAll('[onclick^="filterCategory"]').forEach(btn => btn.className = "bg-white px-6 py-2 rounded-full font-bold text-sm border whitespace-nowrap");
            document.getElementById(`tab-${cat}`).className = "tab-active px-6 py-2 rounded-full font-bold text-sm whitespace-nowrap border";
            renderList(cat === 'all' ? vegetables : vegetables.filter(v => v.category === cat));
        }

        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderList(vegetables.filter(v => (v.name_en + v.name_ml).toLowerCase().includes(q)));
        }

        function openQtyModal(idx) {
            selectedVeg = vegetables[idx];
            document.getElementById('qtyTitle').innerText = selectedVeg.name_ml || selectedVeg.name_en;
            document.getElementById('qtyImg').innerText = selectedVeg.emoji || '🥗';
            document.getElementById('qtyInput').value = 1;
            document.getElementById('qtyModal').style.display = 'flex';
        }

        function closeQtyModal() { document.getElementById('qtyModal').style.display = 'none'; }
        function adjustQty(v) { 
            let i = document.getElementById('qtyInput');
            let n = parseFloat(i.value) + v;
            if(n > 0) i.value = n;
        }

        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            const name = selectedVeg.name_ml || selectedVeg.name_en;
            const existing = cart.find(i => i.name === name);
            if(existing) {
                existing.qty += q;
                existing.total = existing.qty * existing.price;
            } else {
                cart.push({ name, price: parseFloat(selectedVeg.price), qty: q, total: parseFloat(selectedVeg.price) * q });
            }
            updateCartUI();
            closeQtyModal();
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }

        function updateCartUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            document.getElementById('grandTotal').innerText = total.toLocaleString('en-IN');
            document.getElementById('cartBadge').innerText = cart.length;
            document.getElementById('cartBadge').classList.toggle('hidden', cart.length === 0);
            
            document.getElementById('cartList').innerHTML = cart.map((it, i) => `
                <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl mb-2 border dark:border-slate-700">
                    <div>
                        <div class="font-bold dark:text-white uppercase text-sm">${it.name}</div>
                        <div class="text-[10px] text-slate-500 font-bold">${it.qty}kg x ₹${it.price}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="font-black text-green-600">₹${it.total.toFixed(0)}</div>
                        <button onclick="cart.splice(${i},1); updateCartUI();" class="text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // Bluetooth Printing using RawBT Intent
        function printReceipt() {
            if (cart.length === 0) return alert("ലിസ്റ്റ് കാലിയാണ്!");

            const name = document.getElementById('custName').value || "Guest";
            const place = document.getElementById('custPlace').value || "-";
            const date = new Date().toLocaleString('en-IN');
            
            let printData = "--------------------------------\n";
            printData += "       KOCHACHAN MARKET        \n";
            printData += "--------------------------------\n";
            printData += `DATE: ${date}\n`;
            printData += `NAME: ${name}\n`;
            printData += `PLACE: ${place}\n`;
            printData += "--------------------------------\n";
            printData += "ITEM            QTY    TOTAL\n";
            printData += "--------------------------------\n";

            cart.forEach(it => {
                let itemName = it.name.substring(0, 14).padEnd(15);
                let qty = it.qty.toString().padEnd(6);
                let total = "Rs." + it.total.toFixed(0);
                printData += `${itemName} ${qty} ${total}\n`;
            });

            printData += "--------------------------------\n";
            printData += `GRAND TOTAL: Rs.${document.getElementById('grandTotal').innerText}\n`;
            printData += "--------------------------------\n";
            printData += "   THANK YOU! VISIT AGAIN   \n\n\n\n";

            // Sending to RawBT Printer App
            const S = "intent://ru.a402d.rawbtprinter.action.PRINT#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.text=" + encodeURIComponent(printData) + ";end;";
            window.location.href = S;
        }

        function sendWhatsAppOrder() {
            if(cart.length === 0) return alert("List empty!");
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            const name = document.getElementById('custName').value || "Guest";
            let msg = `🧾 *KOCHACHAN MARKET*\n👤 Customer: ${name}\n━━━━━━━━━━━━━━\n`;
            cart.forEach(it => { msg += `• ${it.name} (${it.qty}kg) - ₹${it.total.toFixed(0)}\n`; });
            msg += `━━━━━━━━━━━━━━\n💰 *TOTAL: ₹${document.getElementById('grandTotal').innerText}*`;
            window.open(`https://wa.me/918589944310?text=${encodeURIComponent(msg)}`);
        }

        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('show-cart'); }
        
        setInterval(() => { 
            document.getElementById('billDateTime').innerText = new Date().toLocaleString('en-IN', { weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }); 
        }, 1000);
        
        loadData();
    </script>
</body>
</html>
