<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochachan 🍅 Vegetable And Fruits 🍇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Manjari', sans-serif; transition: 0.3s; overflow-x: hidden; }
        
        /* Mode Colors */
        .dark-mode { background-color: #020617 !important; color: #f8fafc; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: white !important; }
        .dark-mode .text-slate-800, .dark-mode .text-slate-400 { color: #f1f5f9 !important; }
        
        /* Animations */
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        @keyframes bounce-basket {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .basket-bounce { animation: bounce-basket 0.5s ease; }

        #cartSidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .show-cart { transform: translateY(0) !important; }
        
        .item-card { height: 160px; }
        .item-emoji { font-size: 55px; }
        .item-img { width: 65px; height: 65px; object-fit: contain; margin: 0 auto; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-800" id="mainBody">

    <div id="screenshotArea" class="bg-white">
        <header class="bg-green-800 text-white p-5 shadow-lg flex flex-col items-center">
            <h1 class="text-2xl font-black tracking-tight uppercase text-center">Kochachan 🥕 Veg & Fruits 🍎</h1>
            <div id="billDateTime" class="text-xs font-bold opacity-90 mt-1 uppercase"></div>
        </header>

        <div class="bg-yellow-400 py-1 text-center no-print">
            <div class="overflow-hidden">
                <div class="animate-marquee">
                    <span class="text-green-900 font-black text-sm uppercase">
                        🌼 Happy Vishu 🌼 | ഏവർക്കും ഐശ്വര്യപൂർണ്ണമായ വിഷു ആശംസകൾ! 🥬🍅
                    </span>
                </div>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-4">
            <div class="mb-4 no-print relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="തിരയുക (Search)..." 
                    class="w-full pl-12 p-4 rounded-2xl border-2 border-slate-200 outline-none focus:border-green-500 font-bold text-slate-800 shadow-sm transition">
            </div>
            
            <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <div class="col-span-full text-center py-20 font-bold text-slate-400">Loading...</div>
            </div>
        </main>

        <div id="billPrintArea" class="hidden p-6 bg-white">
            <div id="cartListBill" class="space-y-4"></div>
            <div class="mt-8 p-6 bg-green-50 rounded-3xl border-2 border-green-200 text-center">
                <div class="text-slate-500 font-black text-xs uppercase mb-1">Grand Total</div>
                <div class="text-4xl font-black text-green-700">₹<span id="billTotal">0</span> 😊</div>
                <div class="text-[10px] text-slate-400 mt-4 uppercase font-bold">Thank you for shopping with us!</div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-green-700 text-white p-4 shadow-2xl z-[60] no-print flex justify-between items-center cursor-pointer" onclick="toggleCart()">
        <div class="flex items-center gap-4">
            <div id="basketIcon" class="bg-white/20 p-3 rounded-xl"><i class="fas fa-shopping-basket text-xl"></i></div>
            <div>
                <div class="font-black text-sm uppercase">Bill Details</div>
                <div class="text-[11px] font-bold opacity-80"><span id="itemCount">0</span> Items</div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <div class="text-2xl font-black">₹<span id="grandTotal">0</span></div>
            </div>
            <button onclick="event.stopPropagation(); toggleDarkMode();" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center">
                <i class="fas fa-moon text-xs"></i>
            </button>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 bg-white h-[85vh] rounded-t-[2.5rem] z-[70] transform translate-y-full flex flex-col no-print border-t shadow-2xl">
        <div class="w-12 h-1.5 bg-slate-300 rounded-full mx-auto mt-3 mb-1"></div>
        <div class="px-6 py-4 border-b flex justify-between items-center">
            <span class="font-black text-xl text-slate-800">Current Bill</span>
            <div class="flex gap-3">
                <button onclick="takeScreenshot()" class="bg-blue-50 text-blue-600 p-3 rounded-xl hover:bg-blue-100 transition">
                    <i class="fas fa-camera"></i>
                </button>
                <button onclick="toggleCart()" class="text-slate-400 text-3xl"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4">
            <div id="cartList" class="space-y-3"></div>
        </div>

        <div class="p-6 space-y-3 bg-slate-50 rounded-t-3xl border-t">
            <div class="flex justify-between items-center mb-2 px-2">
                <span class="font-black text-slate-400 uppercase text-xs">Total Amount</span>
                <span class="font-black text-2xl text-green-700">₹<span id="sideTotal">0</span></span>
            </div>
            <button onclick="sendWhatsAppOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase flex items-center justify-center gap-2 active:scale-95 transition">
                <i class="fab fa-whatsapp text-xl"></i> Order Via WhatsApp
            </button>
            <button onclick="clearCart()" class="w-full py-1 text-red-500 font-bold text-[10px] uppercase">Clear Cart</button>
        </div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-[110] backdrop-blur-sm p-4">
        <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center">
            <div id="qtyImgContainer" class="mb-2"></div>
            <h3 id="qtyTitle" class="text-2xl font-black text-slate-800 uppercase"></h3>
            <p id="qtyTitleML" class="text-sm font-bold text-slate-500 mb-6"></p>
            <div class="relative">
                <input type="number" id="qtyInput" class="w-full text-center text-4xl font-black p-5 bg-slate-100 rounded-2xl mb-6 outline-none text-green-700" value="1" step="0.01">
                <span class="absolute right-4 top-6 font-black text-slate-300">KG</span>
            </div>
            <div class="grid grid-cols-4 gap-2 mb-6">
                <button onclick="setQty(0.1)" class="bg-slate-100 p-2 rounded-xl text-[10px] font-black">100g</button>
                <button onclick="setQty(0.25)" class="bg-slate-100 p-2 rounded-xl text-[10px] font-black">250g</button>
                <button onclick="setQty(0.5)" class="bg-slate-100 p-2 rounded-xl text-[10px] font-black">500g</button>
                <button onclick="setQty(1)" class="bg-slate-100 p-2 rounded-xl text-[10px] font-black">1kg</button>
            </div>
            <div class="flex gap-3">
                <button onclick="confirmAddToCart()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg">ADD</button>
                <button onclick="closeQtyModal()" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-2xl font-black">BACK</button>
            </div>
        </div>
    </div>

    <script>
        const originalAPI = "https://price-update-pi.vercel.app/api/veg";
        const apiURL = "https://api.allorigins.win/get?url=" + encodeURIComponent(originalAPI);

        let vegetables = [];
        let cart = [];
        let selectedVeg = null;

        async function loadVegetables() {
            try {
                const response = await fetch(apiURL);
                const result = await response.json();
                const data = typeof result.contents === 'string' ? JSON.parse(result.contents) : result.contents;
                if(Array.isArray(data)) { vegetables = data; renderList(); }
            } catch (e) {
                document.getElementById('vegContainer').innerHTML = `<div class="col-span-full text-center py-20 text-red-500">Error Loading Data!</div>`;
            }
        }

        function renderList() {
            const container = document.getElementById('vegContainer');
            container.innerHTML = vegetables.map((v, i) => `
                <div class="bg-white p-5 rounded-3xl text-center shadow-sm cursor-pointer flex flex-col justify-between transition-all active:scale-90 border border-slate-100 item-card" onclick="openQtyModal(${i})">
                    <div>
                        <div class="item-emoji">${v.emoji || '🥗'}</div>
                        <div class="font-black text-slate-800 text-[14px] leading-tight uppercase mt-2">${v.name_ml || v.name_en}</div>
                        <div class="text-green-600 font-black text-xl mt-1">₹${v.price}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${v.unit || '1 kg'}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateCartUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            document.getElementById('itemCount').innerText = cart.length;
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('sideTotal').innerText = total.toFixed(2);
            document.getElementById('billTotal').innerText = total.toFixed(2);
            
            const list = document.getElementById('cartList');
            const listBill = document.getElementById('cartListBill');

            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold text-xs">NO ITEMS</div>`;
                return;
            }

            const itemsHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-white border border-slate-100 p-4 rounded-2xl shadow-sm">
                    <div>
                        <div class="font-black text-slate-800 text-[18px] uppercase">${item.name}</div>
                        <div class="text-[13px] font-bold text-slate-400">${item.qty}kg × ₹${item.price}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-green-700 text-[20px]">₹${item.total.toFixed(2)}</span>
                        <button onclick="event.stopPropagation(); cart.splice(${i},1); updateCartUI();" class="text-red-300 no-print"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
            
            list.innerHTML = itemsHTML;
            listBill.innerHTML = itemsHTML; // Same for screenshot
        }

        async function takeScreenshot() {
            if(cart.length === 0) return alert("Add items first!");
            const printArea = document.getElementById('billPrintArea');
            const mainBody = document.getElementById('mainBody');
            
            // Show print area, hide others
            printArea.classList.remove('hidden');
            document.querySelector('main').classList.add('no-print');
            
            const canvas = await html2canvas(document.getElementById('screenshotArea'), { scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = `Kochachan_Bill_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();

            // Reset
            printArea.classList.add('hidden');
            document.querySelector('main').classList.remove('no-print');
        }

        function sendWhatsAppOrder() {
            if(cart.length === 0) return alert("Add items!");
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN') + ", " + now.toLocaleTimeString('en-IN');
            
            let msg = "🛒 *പുതിയ ഓർഡർ - Kochachan 🌶️ Vegetable And Fruits 🍉* 🛒\n";
            msg += "━━━━━━━━━━━━━━━━━━\n";
            cart.forEach((it, idx) => {
                msg += `${idx + 1}. *${it.name}* 📦\n`;
                msg += `   ${it.qty}kg × ₹${it.price} = *₹${it.total.toFixed(2)}*\n`;
            });
            msg += "━━━━━━━━━━━━━━━━━━\n";
            msg += `💰 *ആകെ തുക: ₹${document.getElementById('sideTotal').innerText}*\n`;
            msg += "━━━━━━━━━━━━━━━━━━\n";
            msg += `📅 Date: ${dateStr}`;
            
            window.open(`https://wa.me/918589944310?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('show-cart'); }
        
        function openQtyModal(i) {
            selectedVeg = vegetables[i];
            document.getElementById('qtyTitle').innerText = selectedVeg.name_en;
            document.getElementById('qtyTitleML').innerText = selectedVeg.name_ml;
            document.getElementById('qtyImgContainer').innerText = selectedVeg.emoji || '🥗';
            document.getElementById('qtyInput').value = 1;
            document.getElementById('qtyModal').style.display = 'flex';
        }

        function closeQtyModal() { document.getElementById('qtyModal').style.display = 'none'; }
        function setQty(v) { document.getElementById('qtyInput').value = v; }

        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            if(q > 0) {
                cart.push({ 
                    name: selectedVeg.name_ml || selectedVeg.name_en, 
                    price: parseFloat(selectedVeg.price), 
                    qty: q, 
                    total: parseFloat(selectedVeg.price) * q 
                });
                
                // Animation
                const basket = document.getElementById('basketIcon');
                basket.classList.add('basket-bounce');
                setTimeout(() => basket.classList.remove('basket-bounce'), 500);

                updateCartUI(); closeQtyModal();
            }
        }

        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.item-card');
            vegetables.forEach((v, i) => {
                const name = (v.name_en + v.name_ml + v.name_manglish).toLowerCase();
                items[i].style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        function clearCart() { if(confirm("Clear Cart?")) { cart = []; updateCartUI(); } }

        setInterval(() => { 
            const now = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
            document.getElementById('billDateTime').innerText = now; 
        }, 1000);

        loadVegetables();
    </script>
</body>
</html>
