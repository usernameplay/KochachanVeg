<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochachan 🍅 Vegetable And Fruits 🍇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Manjari', sans-serif; transition: background-color 0.4s; overflow-x: hidden; }
        .glass-header { background: rgba(22, 101, 52, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark-mode { background-color: #020617 !important; color: #f8fafc; }
        .dark-mode .bg-white { background-color: rgba(30, 41, 59, 0.8) !important; color: white !important; border-color: #334155; }
        .dark-mode .text-slate-800 { color: #f1f5f9 !important; }
        .dark-mode #cartSidebar { background-color: #1e293b !important; color: white; }
        .dark-mode .bg-slate-50 { background-color: #0f172a !important; }
        
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        #cartSidebar { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .show-cart { transform: translateY(0) !important; }
        #screenshotArea { background: white; padding: 20px; border-radius: 20px; }
        .dark-mode #screenshotArea { background: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24" id="mainBody">

    <header class="glass-header text-white p-4 shadow-lg sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-2">
            <div class="w-10"></div>
            <div class="text-center">
                <h1 class="text-xl font-black tracking-tight leading-none uppercase">Kochachan 🥕 Veg & Fruits 🍎</h1>
                <div id="liveTime" class="text-[11px] font-bold opacity-90 mt-1 uppercase"></div>
            </div>
            <button onclick="toggleDarkMode()" class="bg-white/20 h-10 w-10 rounded-xl flex items-center justify-center backdrop-blur-sm shadow-sm">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="bg-yellow-400 overflow-hidden py-1.5 shadow-inner no-print">
        <div class="animate-marquee">
            <span class="text-yellow-900 font-black text-sm uppercase tracking-wide">
                🌼 Happy Vishu 🌼 | ഏവർക്കും ഐശ്വര്യപൂർണ്ണമായ വിഷു ആശംസകൾ! 🥬🍅 | UPDATING | TEST RUN 🙇
            </span>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 mt-2">
        <div class="mb-6 no-print relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="തിരയുക (Search)..." 
                class="w-full pl-14 p-4 rounded-2xl border border-slate-200 outline-none focus:border-green-500 font-bold text-slate-800 shadow-sm bg-white/80">
        </div>
        <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-green-700 text-white p-4 shadow-lg z-[60] no-print flex justify-between items-center cursor-pointer" onclick="toggleCart()">
        <div class="flex items-center gap-4">
            <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-shopping-basket"></i></div>
            <div>
                <div class="font-black text-sm uppercase">Bill Details</div>
                <div class="text-[12px] font-bold opacity-80"><span id="itemCount">0</span> Items Added</div>
            </div>
        </div>
        <div class="text-right">
            <div class="text-3xl font-black">₹<span id="grandTotal">0</span></div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 bg-white h-[85vh] rounded-t-[2.5rem] z-[70] transform translate-y-full flex flex-col no-print border-t shadow-2xl">
        <div class="w-16 h-1.5 bg-slate-300 rounded-full mx-auto mt-4 mb-2"></div>
        <div class="px-8 py-5 border-b flex justify-between items-center">
            <span class="font-black text-2xl text-slate-800">Your Cart</span>
            <div class="flex gap-4 items-center">
                <button onclick="takeScreenshot()" class="bg-blue-100 text-blue-600 p-3 rounded-xl hover:bg-blue-200 transition">
                    <i class="fas fa-camera"></i>
                </button>
                <button onclick="toggleCart()" class="text-slate-400 text-3xl"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>

        <div id="screenshotArea" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div id="cartList" class="space-y-4"></div>
            <div id="screenshotFooter" class="hidden mt-6 pt-4 border-t-2 border-dashed border-slate-200 text-center">
                <p class="font-black text-green-700 uppercase">Kochachan Vegetable And Fruits</p>
                <p id="screenshotTime" class="text-[10px] text-slate-400 font-bold"></p>
            </div>
        </div>

        <div class="p-6 bg-slate-50 space-y-4 rounded-t-3xl border-t">
            <div class="flex justify-between items-center px-2">
                <span class="font-black text-slate-500 uppercase text-xs">Total Amount:</span>
                <span class="font-black text-3xl text-green-700">₹<span id="sideTotal">0</span></span>
            </div>
            <button onclick="sendWhatsAppOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-2xl"></i> Order Via WhatsApp
            </button>
            <button onclick="clearCart()" class="w-full py-1 text-red-400 font-black text-xs uppercase tracking-wider">Clear All</button>
        </div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[110] backdrop-blur-md p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-xs shadow-2xl text-center">
            <div id="qtyIcon" class="text-6xl mb-4"></div>
            <h3 id="qtyTitle" class="text-2xl font-black text-slate-800 uppercase"></h3>
            <p id="qtyTitleML" class="text-sm font-bold text-slate-400 mb-6"></p>
            <input type="number" id="qtyInput" class="w-full text-center text-4xl font-black p-4 bg-slate-100 rounded-2xl mb-6 outline-none" value="1" step="0.01">
            <div class="grid grid-cols-4 gap-2 mb-8">
                <button onclick="setQty(0.100)" class="bg-slate-100 p-3 rounded-xl text-[10px] font-black uppercase">100g</button>
                <button onclick="setQty(0.250)" class="bg-slate-100 p-3 rounded-xl text-[10px] font-black uppercase">250g</button>
                <button onclick="setQty(0.500)" class="bg-slate-100 p-3 rounded-xl text-[10px] font-black uppercase">500g</button>
                <button onclick="setQty(0.750)" class="bg-slate-100 p-3 rounded-xl text-[10px] font-black uppercase">750g</button>
            </div>
            <div class="flex gap-3">
                <button onclick="closeQtyModal()" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black uppercase">Back</button>
                <button onclick="confirmAddToCart()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black uppercase">Add</button>
            </div>
        </div>
    </div>

    <script>
        // പച്ചക്കറികളുടെ ഡാറ്റ ഇവിടെ മാറ്റാം
        const vegetables = [
            {"id":1,"name":"Tomato","name_ml":"തക്കാളി","price":40,"image":"🍅","updated_at":"2026-04-18 10:30 AM"},
            {"id":2,"name":"Potato","name_ml":"ഉരുളക്കിഴങ്ങ്","price":22,"image":"🥔","updated_at":"2026-04-17 09:15 AM"},
            {"id":3,"name":"Onion","name_ml":"സവാള","price":32,"image":"🧅","updated_at":"2026-04-18 11:00 AM"},
            {"id":4,"name":"Carrot","name_ml":"കാരറ്റ്","price":50,"image":"🥕","updated_at":""},
            {"id":5,"name":"Cabbage","name_ml":"കാബേജ്","price":25,"image":"🥬","updated_at":""}
        ];
        
        let cart = [];
        let selectedVeg = null;

        function renderList() {
            const container = document.getElementById('vegContainer');
            container.innerHTML = vegetables.map((v, i) => `
                <div class="bg-white p-5 rounded-[1.5rem] text-center shadow-sm cursor-pointer flex flex-col justify-between" onclick="openQtyModal(${i})">
                    <div>
                        <div class="text-5xl mb-3">${v.image}</div>
                        <div class="font-black text-slate-800 text-sm truncate uppercase">${v.name_ml || v.name}</div>
                        <div class="text-green-600 font-black text-xl mt-1">₹${v.price}</div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-50 text-[9px] text-slate-400 font-bold uppercase">
                        ${v.updated_at ? 'Updated: ' + v.updated_at : ''}
                    </div>
                </div>
            `).join('');
        }

        function updateCartUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            document.getElementById('itemCount').innerText = cart.length;
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('sideTotal').innerText = total.toFixed(2);
            const list = document.getElementById('cartList');
            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase text-xs">Empty Cart</div>`;
                return;
            }
            list.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-white border border-slate-100 p-4 rounded-2xl shadow-sm">
                    <div>
                        <div class="font-black text-slate-800 text-[14px] uppercase">${item.name}</div>
                        <div class="text-[11px] font-bold text-slate-400">${item.qty}kg x ₹${item.price}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-green-700 text-lg">₹${item.total.toFixed(2)}</span>
                        <button onclick="event.stopPropagation(); cart.splice(${i},1); updateCartUI();" class="text-red-300 p-2 no-print"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function takeScreenshot() {
            if(cart.length === 0) return alert("Cart is empty!");
            
            const area = document.getElementById('screenshotArea');
            const footer = document.getElementById('screenshotFooter');
            const timeSpan = document.getElementById('screenshotTime');
            
            // Show hidden details for screenshot
            footer.classList.remove('hidden');
            timeSpan.innerText = new Date().toLocaleString('en-IN');
            
            html2canvas(area, {
                backgroundColor: document.body.classList.contains('dark-mode') ? '#1e293b' : '#ffffff',
                scale: 2, // Higher quality
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Kochachan_Bill_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                // Hide again after screenshot
                footer.classList.add('hidden');
            });
        }

        function sendWhatsAppOrder() {
            if(cart.length === 0) return alert("Cart is empty!");
            let message = "🛒 *പുതിയ ഓർഡർ - Kochachan Veg & Fruits* 🛒\n━━━━━━━━━━━━━━━━━━\n";
            cart.forEach((item, index) => {
                message += `${index + 1}. *${item.name}*\n   ${item.qty}kg × ₹${item.price} = *₹${item.total.toFixed(2)}*\n`;
            });
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `💰 *ആകെ തുക: ₹${document.getElementById('sideTotal').innerText}*\n━━━━━━━━━━━━━━━━━━\n`;
            message += `📅 ${new Date().toLocaleString('en-IN')}`;
            window.open(`https://wa.me/918589944310?text=${encodeURIComponent(message)}`, '_blank');
        }

        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('vegContainer');
            const items = container.querySelectorAll('.bg-white');
            vegetables.forEach((v, i) => {
                const match = v.name.toLowerCase().includes(q) || v.name_ml.toLowerCase().includes(q);
                if(items[i]) items[i].style.display = match ? 'flex' : 'none';
            });
        }

        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('show-cart'); }
        function openQtyModal(i) {
            selectedVeg = vegetables[i];
            document.getElementById('qtyTitle').innerText = selectedVeg.name;
            document.getElementById('qtyTitleML').innerText = selectedVeg.name_ml;
            document.getElementById('qtyIcon').innerText = selectedVeg.image;
            document.getElementById('qtyInput').value = 1;
            document.getElementById('qtyModal').style.display = 'flex';
        }
        function closeQtyModal() { document.getElementById('qtyModal').style.display = 'none'; }
        function setQty(v) { document.getElementById('qtyInput').value = v; }
        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            if(q > 0) {
                cart.push({ name: selectedVeg.name_ml || selectedVeg.name, price: selectedVeg.price, qty: q, total: selectedVeg.price * q });
                updateCartUI(); closeQtyModal();
            }
        }
        function clearCart() { if(confirm("Clear bill?")) { cart = []; updateCartUI(); } }

        setInterval(() => { 
            document.getElementById('liveTime').innerText = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'medium' }); 
        }, 1000);

        renderList();
    </script>
</body>
</html>
