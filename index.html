<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochachan Veg & Fruits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Manjari', sans-serif; transition: background 0.3s; }
        
        .dark-mode { background-color: #0f172a !important; color: #f8fafc; }
        .dark-mode .bg-card { background-color: #1e293b !important; border-color: #334155; }
        .dark-mode .text-main { color: #f1f5f9 !important; }
        .dark-mode .text-sub { color: #94a3b8 !important; }
        .dark-mode .modal-bg { background-color: #1e293b !important; }
        .dark-mode .btn-secondary { background-color: #334155 !important; color: white !important; }
        .dark-mode input { background-color: #0f172a !important; color: white !important; border-color: #475569 !important; }

        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 18s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        @keyframes bounce-basket {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        .basket-bounce { animation: bounce-basket 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #cartSidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .show-cart { transform: translateY(0) !important; }
        
        .item-card { transition: all 0.2s ease; border: 1px solid rgba(0,0,0,0.05); }
        .item-emoji { font-size: 45px; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-28 text-slate-800" id="mainBody">

    <div id="screenshotArea" class="bg-inherit">
        <header class="bg-green-800 text-white p-5 shadow-lg flex flex-col items-center">
            <h1 class="text-xl font-black tracking-tight uppercase text-center">Kochachan 🥕 Veg & Fruits 🍎</h1>
            <div id="billDateTime" class="text-[10px] font-bold opacity-80 mt-1 tracking-widest uppercase"></div>
        </header>

        <div class="bg-yellow-400 py-1.5 border-b border-yellow-500/30 no-print">
            <div class="overflow-hidden">
                <div class="animate-marquee">
                    <span class="text-green-900 font-black text-xs uppercase tracking-wider">
                        🌼 Happy Vishu 🌼 | ഏവർക്കും ഐശ്വര്യപൂർണ്ണമായ വിഷു ആശംസകൾ! | UPDATING PRICES DAILY 🥬🍅
                    </span>
                </div>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-4">
            <div class="mb-6 no-print relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="Search items..." 
                    class="w-full pl-12 p-4 rounded-2xl border-2 border-slate-200 outline-none focus:border-green-500 font-bold text-slate-700 shadow-sm transition">
            </div>
            
            <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                <div class="col-span-full text-center py-20 text-slate-400 animate-pulse font-bold">Connecting to store...</div>
            </div>
        </main>

        <div id="billPrintArea" class="hidden p-6 bg-white text-slate-900">
            <div class="border-b-2 border-dashed border-slate-200 mb-4 pb-4 text-center">
                <p class="font-black text-sm uppercase">Order Summary</p>
            </div>
            <div id="cartListBill" class="space-y-3"></div>
            <div class="mt-8 p-6 bg-green-50 rounded-3xl border-2 border-green-100 text-center">
                <div class="text-slate-400 font-black text-[10px] uppercase mb-1">Payable Amount</div>
                <div class="text-3xl font-black text-green-700">₹<span id="billTotal">0</span> 😊</div>
                <p class="text-[9px] font-bold text-slate-400 mt-4 uppercase">Freshness Guaranteed!</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-green-700 text-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.15)] z-[60] no-print flex justify-between items-center cursor-pointer" onclick="toggleCart()">
        <div class="flex items-center gap-4">
            <div id="basketIcon" class="bg-white/20 p-3 rounded-xl transition-all"><i class="fas fa-shopping-basket text-xl"></i></div>
            <div>
                <div class="font-black text-sm uppercase tracking-tight">Cart</div>
                <div class="text-[10px] font-bold opacity-75"><span id="itemCount">0</span> Items Added</div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <div class="text-2xl font-black">₹<span id="grandTotal">0</span></div>
            </div>
            <button onclick="event.stopPropagation(); toggleDarkMode();" class="bg-black/20 h-10 w-10 rounded-full flex items-center justify-center hover:bg-black/30 transition">
                <i class="fas fa-moon text-xs"></i>
            </button>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 bg-white h-[80vh] rounded-t-[2.5rem] z-[70] transform translate-y-full flex flex-col no-print border-t shadow-2xl modal-bg">
        <div class="w-12 h-1.5 bg-slate-300 rounded-full mx-auto mt-3 mb-1"></div>
        <div class="px-6 py-5 border-b flex justify-between items-center">
            <span class="font-black text-xl text-main uppercase tracking-tight">Your Bill</span>
            <div class="flex gap-2">
                <button onclick="takeScreenshot()" class="bg-blue-50 text-blue-600 p-3 rounded-xl"><i class="fas fa-camera"></i></button>
                <button onclick="toggleCart()" class="text-slate-400 text-3xl"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4" id="cartList"></div>

        <div class="p-6 bg-slate-50 border-t modal-bg">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="font-black text-slate-400 uppercase text-xs">Total Amount</span>
                <span class="font-black text-2xl text-green-600">₹<span id="sideTotal">0</span></span>
            </div>
            <button onclick="sendWhatsAppOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase flex items-center justify-center gap-2 active:scale-95 transition">
                <i class="fab fa-whatsapp text-xl"></i> Send to WhatsApp
            </button>
            <button onclick="clearCart()" class="w-full py-2 text-red-500 font-bold text-[10px] uppercase mt-2">Clear All</button>
        </div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[110] backdrop-blur-md p-4">
        <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center modal-bg">
            <div id="qtyImgContainer" class="mb-2 text-5xl"></div>
            <h3 id="qtyTitle" class="text-xl font-black text-main uppercase"></h3>
            <p id="qtyTitleML" class="text-sm font-bold text-sub mb-6"></p>
            
            <input type="number" id="qtyInput" class="w-full text-center text-3xl font-black p-4 bg-slate-100 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-green-500 transition" value="1" step="0.01">
            
            <div class="grid grid-cols-4 gap-2 mb-6">
                <button onclick="setQty(0.1)" class="bg-slate-100 p-2.5 rounded-xl text-[10px] font-black btn-secondary text-slate-600">100g</button>
                <button onclick="setQty(0.25)" class="bg-slate-100 p-2.5 rounded-xl text-[10px] font-black btn-secondary text-slate-600">250g</button>
                <button onclick="setQty(0.5)" class="bg-slate-100 p-2.5 rounded-xl text-[10px] font-black btn-secondary text-slate-600">500g</button>
                <button onclick="setQty(0.75)" class="bg-slate-100 p-2.5 rounded-xl text-[10px] font-black btn-secondary text-slate-600">750g</button>
            </div>
            
            <div class="flex gap-3">
                <button onclick="confirmAddToCart()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg">ADD ITEM</button>
                <button onclick="closeQtyModal()" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black btn-secondary">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        const originalAPI = "https://price-update-pi.vercel.app/api/veg";
        const apiURL = "https://api.allorigins.win/get?url=" + encodeURIComponent(originalAPI);

        let vegetables = [];
        let cart = [];
        let selectedVeg = null;

        async function loadVegetables() {
            try {
                const response = await fetch(apiURL);
                const result = await response.json();
                const data = typeof result.contents === 'string' ? JSON.parse(result.contents) : result.contents;
                if(Array.isArray(data)) { 
                    vegetables = data; 
                    renderList(); 
                }
            } catch (e) {
                document.getElementById('vegContainer').innerHTML = `<div class="col-span-full text-center py-20 text-red-400 font-bold">Check Connection!</div>`;
            }
        }

        function renderList() {
            const container = document.getElementById('vegContainer');
            container.innerHTML = vegetables.map((v, i) => `
                <div class="bg-white p-4 rounded-3xl text-center shadow-sm cursor-pointer flex flex-col justify-between transition-all active:scale-95 bg-card item-card" onclick="openQtyModal(${i})">
                    <div>
                        <div class="item-emoji">${v.emoji || '🥗'}</div>
                        <div class="font-black text-main text-[13px] leading-tight uppercase mt-2">${v.name_ml || v.name_en}</div>
                        <div class="text-green-600 font-black text-lg">₹${v.price}</div>
                        <div class="text-[9px] text-sub font-bold uppercase tracking-tighter">${v.unit || '1 kg'}</div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-slate-100/50">
                        <div class="text-[8px] text-slate-400 font-medium uppercase">Update: ${v.last_updated || 'Today'}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateCartUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            document.getElementById('itemCount').innerText = cart.length;
            const formattedTotal = total.toFixed(2);
            
            document.getElementById('grandTotal').innerText = formattedTotal;
            document.getElementById('sideTotal').innerText = formattedTotal;
            document.getElementById('billTotal').innerText = formattedTotal;
            
            const list = document.getElementById('cartList');
            const listBill = document.getElementById('cartListBill');

            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold text-xs">CART IS EMPTY</div>`;
                return;
            }

            const itemsHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-white border border-slate-100 p-4 rounded-2xl shadow-sm bg-card">
                    <div>
                        <div class="font-black text-main text-[16px] uppercase">${item.name}</div>
                        <div class="text-[12px] font-bold text-sub">${item.qty}kg × ₹${item.price}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-green-600 text-[18px]">₹${item.total.toFixed(2)}</span>
                        <button onclick="event.stopPropagation(); removeFromCart(${i});" class="text-red-300 no-print hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
            
            list.innerHTML = itemsHTML;
            listBill.innerHTML = itemsHTML;
        }

        async function takeScreenshot() {
            if(cart.length === 0) return alert("Empty Cart!");
            const printArea = document.getElementById('billPrintArea');
            printArea.classList.remove('hidden');
            document.querySelector('main').classList.add('no-print');
            
            const canvas = await html2canvas(document.getElementById('screenshotArea'), { scale: 3, useCORS: true });
            const link = document.createElement('a');
            link.download = `Bill_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();

            printArea.classList.add('hidden');
            document.querySelector('main').classList.remove('no-print');
        }

        function sendWhatsAppOrder() {
            if(cart.length === 0) return alert("Empty Cart!");
            const dateStr = new Date().toLocaleString('en-IN', { hour12: true });
            
            let msg = "🛒 *പുതിയ ഓർഡർ - Kochachan 🌶️ Vegetable And Fruits 🍉* 🛒\n";
            msg += "━━━━━━━━━━━━━━━━━━\n";
            cart.forEach((it, idx) => {
                msg += `${idx + 1}. *${it.name}* 📦\n`;
                msg += `   ${it.qty}kg × ₹${it.price} = *₹${it.total.toFixed(2)}*\n`;
            });
            msg += "━━━━━━━━━━━━━━━━━━\n";
            msg += `💰 *ആകെ തുക: ₹${document.getElementById('sideTotal').innerText}*\n`;
            msg += "━━━━━━━━━━━━━━━━━━\n";
            msg += `📅 Date: ${dateStr}`;
            
            window.open(`https://wa.me/918589944310?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('show-cart'); }
        
        function openQtyModal(i) {
            selectedVeg = vegetables[i];
            document.getElementById('qtyTitle').innerText = selectedVeg.name_en;
            document.getElementById('qtyTitleML').innerText = selectedVeg.name_ml;
            document.getElementById('qtyImgContainer').innerText = selectedVeg.emoji || '🥗';
            document.getElementById('qtyInput').value = 1;
            document.getElementById('qtyModal').style.display = 'flex';
        }

        function closeQtyModal() { document.getElementById('qtyModal').style.display = 'none'; }
        function setQty(v) { document.getElementById('qtyInput').value = v; }

        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            if(q > 0) {
                cart.push({ 
                    name: selectedVeg.name_ml || selectedVeg.name_en, 
                    price: parseFloat(selectedVeg.price), 
                    qty: q, 
                    total: parseFloat(selectedVeg.price) * q 
                });
                const basket = document.getElementById('basketIcon');
                basket.classList.add('basket-bounce');
                setTimeout(() => basket.classList.remove('basket-bounce'), 500);
                updateCartUI(); closeQtyModal();
            }
        }

        function removeFromCart(i) { cart.splice(i,1); updateCartUI(); }
        function clearCart() { if(confirm("Clear bill?")) { cart = []; updateCartUI(); } }

        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.item-card');
            vegetables.forEach((v, i) => {
                const name = (v.name_en + (v.name_ml || '') + (v.name_manglish || '')).toLowerCase();
                items[i].style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        setInterval(() => { 
            const now = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short', hour12: true });
            document.getElementById('billDateTime').innerText = now; 
        }, 1000);

        loadVegetables();
    </script>
</body>
                    </html>
