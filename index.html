<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochachan 🍅 Veg & Fruits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Manjari', sans-serif; transition: 0.3s; overflow-x: hidden; }
        
        /* Dark Mode Settings */
        .dark-mode { background-color: #0f172a !important; color: #f8fafc; }
        .dark-mode .bg-card { background-color: #1e293b !important; border-color: #334155 !important; }
        .dark-mode .text-main { color: #f1f5f9 !important; }
        .dark-mode .text-sub { color: #94a3b8 !important; }
        .dark-mode .qty-btn { background-color: #334155 !important; color: #ffffff !important; border: 1px solid #475569 !important; }
        .dark-mode input#qtyInput { background-color: #1e293b !important; color: #ffffff !important; border: 2px solid #475569; }

        .bg-card { background-color: #ffffff; border: 1px solid #e2e8f0; }
        .text-main { color: #1e293b; }
        .text-sub { color: #64748b; }
        .qty-btn { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        #cartSidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .show-cart { transform: translateY(0) !important; }
        
        .item-img { width: 60px; height: 60px; object-fit: contain; margin: 0 auto; display: block; }
        .item-emoji { font-size: 50px; }
        
        /* Screenshot Area Styles */
        #billScreenshotArea { width: 400px; margin: 0 auto; background: white; color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24" id="mainBody">

    <header class="bg-green-800 text-white p-5 shadow-lg sticky top-0 z-50 flex justify-between items-center no-print">
        <h1 class="text-xl font-black tracking-tight uppercase">Kochachan 🥕</h1>
        <div class="flex gap-3">
            <button onclick="toggleDarkMode()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center">
                <i class="fas fa-adjust text-xs"></i>
            </button>
            <button onclick="takeScreenshot()" class="bg-white/20 h-10 w-10 rounded-full flex items-center justify-center">
                <i class="fas fa-camera text-xs"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 no-print">
        <div class="mb-5 relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" onkeyup="filterVeg()" placeholder="Search items..." 
                class="w-full pl-12 p-4 rounded-2xl border-2 border-slate-200 outline-none focus:border-green-500 font-bold text-slate-800 shadow-sm transition">
        </div>
        
        <div id="vegContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            <div class="col-span-full text-center py-20 font-bold text-slate-400">Loading...</div>
        </div>
    </main>

    <div id="screenshotWrapper" style="position: absolute; left: -9999px;">
        <div id="billScreenshotArea">
            <div style="background-color: #166534; padding: 25px; text-align: center; color: white;">
                <h2 style="font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase;">Kochachan Veg & Fruits</h2>
                <p id="ssDate" style="font-size: 10px; opacity: 0.8; margin-top: 5px;"></p>
            </div>
            <div style="padding: 20px;" id="cartListBill">
                </div>
            <div style="padding: 25px; margin: 20px; background-color: #f0fdf4; border-radius: 20px; text-align: center; border: 2px dashed #bbf7d0;">
                <p style="font-size: 12px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 5px;">Grand Total</p>
                <h3 style="font-size: 32px; font-weight: 900; color: #15803d; margin: 0;">₹<span id="billTotal">0</span> 😊</h3>
            </div>
            <div style="text-align: center; padding-bottom: 20px; font-size: 9px; color: #cbd5e1; font-weight: 700; text-transform: uppercase;">Thank you for shopping!</div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-green-700 text-white p-4 shadow-2xl z-[60] no-print flex justify-between items-center cursor-pointer" onclick="toggleCart()">
        <div class="flex items-center gap-4">
            <div id="basketIcon" class="bg-white/20 p-3 rounded-xl"><i class="fas fa-shopping-basket text-lg"></i></div>
            <div class="text-xl font-black">₹<span id="grandTotal">0</span></div>
        </div>
        <div class="font-bold text-xs uppercase opacity-80">Bill Details <i class="fas fa-chevron-up ml-1"></i></div>
    </div>

    <div id="qtyModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[110] backdrop-blur-sm p-4">
        <div class="bg-card p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center border">
            <div id="qtyImgContainer" class="mb-4"></div>
            <h3 id="qtyTitle" class="text-xl font-black text-main uppercase"></h3>
            <p id="qtyTitleML" class="text-sm font-bold text-sub mb-6"></p>
            <input type="number" id="qtyInput" class="w-full text-center text-4xl font-black p-4 rounded-2xl outline-none border-2 border-slate-100 mb-4" value="1">
            <div class="grid grid-cols-2 gap-2 mb-6">
                <button onclick="setQty(0.25)" class="qty-btn p-3 rounded-xl text-xs font-bold">250g</button>
                <button onclick="setQty(0.5)" class="qty-btn p-3 rounded-xl text-xs font-bold">500g</button>
                <button onclick="setQty(1)" class="qty-btn p-3 rounded-xl text-xs font-bold">1kg</button>
                <button onclick="setQty(2)" class="qty-btn p-3 rounded-xl text-xs font-bold">2kg</button>
            </div>
            <div class="flex gap-3">
                <button onclick="confirmAddToCart()" class="flex-1 bg-green-600 text-white py-4 rounded-xl font-bold">ADD</button>
                <button onclick="closeQtyModal()" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-xl font-bold">BACK</button>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-x-0 bottom-0 bg-white h-[85vh] rounded-t-[2rem] z-[70] transform translate-y-full flex flex-col no-print shadow-2xl">
        <div class="w-12 h-1 bg-slate-300 rounded-full mx-auto mt-3"></div>
        <div class="p-6 border-b flex justify-between items-center">
            <span class="font-black text-lg text-slate-800">YOUR BILL</span>
            <button onclick="toggleCart()" class="text-slate-300 text-3xl"><i class="fas fa-times-circle"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 bg-slate-50" id="cartList"></div>
        <div class="p-6 bg-white border-t space-y-3">
            <button onclick="sendWhatsAppOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-lg"></i> SEND WHATSAPP
            </button>
            <button onclick="clearCart()" class="w-full text-red-400 font-bold text-xs uppercase">Clear All</button>
        </div>
    </div>

    <script>
        const apiURL = "https://price-update-pi.vercel.app/api/veg";
        let vegetables = [];
        let cart = [];
        let selectedVeg = null;

        async function loadVegetables() {
            try {
                // പ്രോക്സി ഉപയോഗിച്ച് CORS പ്രശ്നം ഒഴിവാക്കുന്നു
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiURL)}&ts=${Date.now()}`);
                const result = await response.json();
                vegetables = JSON.parse(result.contents);
                renderList();
            } catch (e) {
                document.getElementById('vegContainer').innerHTML = `<p class="col-span-full text-center py-20 text-red-500 font-bold">API Loading Error!</p>`;
            }
        }

        function renderList() {
            const container = document.getElementById('vegContainer');
            container.innerHTML = vegetables.map((v, i) => {
                const display = v.image ? `<img src="${v.image}" class="item-img" crossorigin="anonymous">` : `<div class="item-emoji">${v.emoji || '🥗'}</div>`;
                return `
                <div class="bg-card p-4 rounded-2xl text-center shadow-sm cursor-pointer border flex flex-col justify-between transition active:scale-95" onclick="openQtyModal(${i})">
                    <div>
                        ${display}
                        <div class="font-bold text-main text-[14px] uppercase mt-2">${v.name_ml || v.name_en}</div>
                        <div class="text-green-600 font-black text-lg">₹${v.price}</div>
                    </div>
                    <div class="mt-2 pt-2 border-t text-[8px] text-sub font-bold uppercase">${v.last_updated || 'Updated'}</div>
                </div>`;
            }).join('');
        }

        function updateUI() {
            const total = cart.reduce((s, c) => s + c.total, 0);
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('billTotal').innerText = total.toFixed(2);
            
            const list = document.getElementById('cartList');
            const listBill = document.getElementById('cartListBill');
            
            if(cart.length === 0) {
                list.innerHTML = `<p class="text-center py-10 text-slate-300">Cart is empty</p>`;
                listBill.innerHTML = "";
                return;
            }

            const html = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-white p-4 rounded-xl mb-2 border shadow-sm">
                    <div><div class="font-bold text-slate-800">${item.name}</div><div class="text-xs text-slate-400">${item.qty}kg x ₹${item.price}</div></div>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-green-700">₹${item.total.toFixed(2)}</span>
                        <i class="fas fa-trash text-red-200" onclick="event.stopPropagation(); cart.splice(${i},1); updateUI();"></i>
                    </div>
                </div>`).join('');
            
            list.innerHTML = html;
            listBill.innerHTML = html;
        }

        async function takeScreenshot() {
            if(cart.length === 0) return alert("Add items to bill!");
            document.getElementById('ssDate').innerText = "BILLING DATE: " + new Date().toLocaleString('en-IN');
            
            const area = document.getElementById('billScreenshotArea');
            const canvas = await html2canvas(area, { scale: 2, useCORS: true, allowTaint: true });
            const link = document.createElement('a');
            link.download = `Bill_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('show-cart'); }
        function openQtyModal(i) {
            selectedVeg = vegetables[i];
            document.getElementById('qtyTitle').innerText = selectedVeg.name_en;
            document.getElementById('qtyTitleML').innerText = selectedVeg.name_ml;
            document.getElementById('qtyImgContainer').innerHTML = selectedVeg.image ? `<img src="${selectedVeg.image}" class="item-img" crossorigin="anonymous">` : `<div class="item-emoji">${selectedVeg.emoji}</div>`;
            document.getElementById('qtyModal').style.display = 'flex';
        }
        function closeQtyModal() { document.getElementById('qtyModal').style.display = 'none'; }
        function setQty(v) { document.getElementById('qtyInput').value = v; }
        function confirmAddToCart() {
            const q = parseFloat(document.getElementById('qtyInput').value);
            if(q > 0) {
                cart.push({ name: selectedVeg.name_ml || selectedVeg.name_en, price: parseFloat(selectedVeg.price), qty: q, total: parseFloat(selectedVeg.price) * q });
                updateUI(); closeQtyModal();
            }
        }
        function sendWhatsAppOrder() {
            let msg = "🛒 *Order - Kochachan Veg* 🛒\n";
            cart.forEach((it, idx) => msg += `${idx + 1}. *${it.name}* (${it.qty}kg) - ₹${it.total.toFixed(2)}\n`);
            msg += `\n💰 *Total: ₹${document.getElementById('grandTotal').innerText}*`;
            window.open(`https://wa.me/918589944310?text=${encodeURIComponent(msg)}`);
        }
        function clearCart() { if(confirm("Clear bill?")) { cart = []; updateUI(); } }
        function filterVeg() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('#vegContainer > div');
            vegetables.forEach((v, i) => {
                const txt = (v.name_en + v.name_ml).toLowerCase();
                cards[i].style.display = txt.includes(q) ? 'flex' : 'none';
            });
        }
        loadVegetables();
    </script>
</body>
</html>
